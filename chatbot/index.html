<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar predicción - GasNet Pressure Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel='stylesheet' type='text/css' media='screen' href="./style_chatbot.css">
</head>
<body>
    <!-- Top navigation bar -->
    <nav id="topNav">
        <div class="navLeft">
            <div class="logoContainer">
                <i class="fas fa-gauge-high"></i>
            </div>
            <h1>Gas Pressure Monitor</h1>
            <span class="subtitle">INDUSTRIAL PIPELINE MONITORING SYSTEM</span>
        </div>
        <div class="navRight">
            <button class="navButton" id="btnMapView"><i class="fas fa-map"></i> Map View</button>
            <button class="navButton"><i class="fas fa-chart-line"></i> Dashboard</button>
            <button class="navButton active"><i class="fas fa-robot"></i> AI Assistant</button>
            <button class="navButton"><i class="fas fa-cog"></i> Settings</button>
        </div>
    </nav>

    <div class="container">
        <h1>Consultar predicción</h1>
        <div id="chat-box"></div>
        <div class="input-container">
            <input type="text" id="cuadroParaUserInput" placeholder="Escribe tu pregunta...">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Enviar</button>
        </div>
    </div>
    
    <!-- Cargar primero el archivo de configuración -->
    <script src="../config.js"></script>

    <!-- Después cargar el script principal que usa la configuración -->
    <script src="./chatbot.js"></script>
    
</body>
</html>
